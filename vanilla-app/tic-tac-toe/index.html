<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe — Vanilla JS</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">
    <a class="back" href="../index.html">← Back to Hub</a>
    <h1 class="heading">Tic Tac Toe</h1>
    <p class="subheading">Two-player game with win detection, draw, move history time-travel, and ARIA grid.</p>

    <div class="layout">
      <div class="game-wrap">
        <p id="status" class="status" aria-live="polite">Player X's turn</p>
        <div id="board" class="board" role="grid" aria-label="Tic-tac-toe board"></div>
        <button id="resetBtn" class="btn-reset">New Game</button>
      </div>

      <div class="history-wrap">
        <h2 class="history-title">Move History</h2>
        <ol id="history" class="history" aria-label="Move history"></ol>
      </div>
    </div>
  </div>
  <script src="./script.js"></script>
</body>
</html>
