<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Checkbox — Vanilla JS</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">
    <a class="back" href="../index.html">← Back to Hub</a>
    <h1 class="heading">Tree Checkbox</h1>

    <div class="demo">
      <p id="selectionInfo" class="selection-info" aria-live="polite">0 items selected</p>
      <ul id="tree" class="tree" role="tree" aria-label="Topic selection"></ul>
    </div>
  </div>
